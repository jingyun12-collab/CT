      inset: 0;

    }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 200, 160, 0.5);
      animation: pulseRing 2.5s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
    .pulse-ring:nth-child(3) { animation-delay: 1.6s; }

    @keyframes pulseRing {
      0%   { width: 80px;  height: 80px;  opacity: 0.7; }
      100% { width: 320px; height: 320px; opacity: 0; }
    }

    .logo-wrap img {
      position: relative;
      width: min(480px, 75vw);
      display: block;
      mix-blend-mode: screen;
      filter: invert(1) brightness(0.85);
      animation: logoPulse 2.5s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 0.85; filter: invert(1) brightness(0.85); }
      50%      { opacity: 1;    filter: invert(1) brightness(1.05); }
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,200,160,0.7), transparent);
    }

    .tagline { text-align: center; }

    .tagline p {
      font-weight: 200;
      font-size: clamp(11px, 1.8vw, 14px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .tagline p + p {
      margin-top: 10px;
      font-size: clamp(9px, 1.4vw, 11px);
      letter-spacing: 0.25em;
      color: rgba(255,200,160,0.45);
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .shine {
      background: linear-gradient(90deg, rgba(255,200,160,0.5) 0%, rgba(255,235,210,1) 50%, rgba(255,200,160,0.5) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }
  </style>
</head>
